          description: Trash emptied
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted_count:
                    type: integer

  /api/v1/payment_allocations/delete/bulk:
    post:
      tags:
        - PaymentAllocations
      summary: Bulk soft-delete PaymentAllocations by ids (atomic)
      operationId: bulkDeletePaymentAllocations
      requestBody:
        $ref: '#/components/requestBodies/BatchIds'
      responses:
        '200':
          description: Soft-deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  soft_deleted: { type: integer }
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/payment_allocations/restore/bulk:
    post:
      tags:
        - PaymentAllocations
      summary: Bulk restore PaymentAllocations by ids (atomic)
      operationId: bulkRestorePaymentAllocations
      requestBody:
        $ref: '#/components/requestBodies/BatchIds'
      responses:
        '200':
          description: Restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentAllocationBulkResult'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/payment_allocations/restore/all:
    post:
      tags:
        - PaymentAllocations
      summary: Restore all soft-deleted PaymentAllocations
      operationId: restoreAllPaymentAllocations
      responses:
        '200':
          description: Restored
          content:
            application/json:
              schema:
                type: object
                properties:
                  restored: { type: integer }

  /api/v1/payment_allocations/trash/bulk:
    delete:
      tags:
        - PaymentAllocations
      summary: Bulk permanently-delete PaymentAllocations from trash by ids (atomic)
      operationId: bulkPermanentDeletePaymentAllocations
      requestBody:
        $ref: '#/components/requestBodies/BatchIds'
      responses:
        '200':
          description: Permanently deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  permanently_deleted: { type: integer }
        '400':
          $ref: '#/components/responses/BadRequest'

